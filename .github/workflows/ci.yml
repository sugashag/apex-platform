name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    name: Lint, type-check, migrate, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: apex
          POSTGRES_PASSWORD: apex
          POSTGRES_DB: apex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U apex -d apex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://apex:apex@localhost:5432/apex
      DATABASE_URL_SYNC: postgresql+psycopg://apex:apex@localhost:5432/apex
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-do-not-use-in-prod
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      ENVIRONMENT: development
      VERSION: 0.1.0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry==1.8.4

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Ruff (lint)
        run: poetry run ruff check .

      - name: Mypy (type check)
        run: poetry run mypy app/

      - name: Alembic upgrade head
        run: poetry run alembic upgrade head

      - name: Alembic check (no pending autogen diffs)
        run: poetry run alembic check

      - name: Pytest
        run: poetry run pytest -v
